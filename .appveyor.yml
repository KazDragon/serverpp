image:
  - Visual Studio 2019

# Build only on the master branch, and for PRs
branches:
  only:
    - master

build:
  parallel: true
  verbosity: detailed

configuration:
  - Debug
  - Release

environment:
  APPVEYOR_SAVE_CACHE_ON_ERROR: true
  VCPKG_ROOT: C:\Tools\vcpkg
  VCPKG_DEFAULT_BINARY_CACHE: C:\Tools\vcpkg\archives
  CMAKE_BUILD_PARALLEL_LEVEL: 4

  matrix:
    - platform: x64

cache:
  - C:\Tools\vcpkg\installed
  - C:\Tools\vcpkg\downloads
  - C:\Tools\vcpkg\archives

init:
  - echo Appveyor Image = %APPVEYOR_BUILD_WORKER_IMAGE%
  - if "%APPVEYOR_BUILD_WORKER_IMAGE%"=="Visual Studio 2019" ( set "generator=Visual Studio 16 2019" && set "toolset=v142" )
  - echo Generator = %generator%

install:
  - cd %VCPKG_ROOT%
  - git fetch --tags --prune
  - git checkout 58950f88544e4637524dbd6a01d0317cf4cb77fc
  - .\bootstrap-vcpkg.bat
  - cd %appveyor_build_folder%
  - %VCPKG_ROOT%\vcpkg install boost-asio:%platform%-windows
  - %VCPKG_ROOT%\vcpkg install boost-range:%platform%-windows

build_script:
  - mkdir build
  - cd build
  - cmake -G "%generator%" -DCMAKE_TOOLCHAIN_FILE=%VCPKG_ROOT%/scripts/buildsystems/vcpkg.cmake  ..
  - cmake --build . --config %configuration% -- /m
